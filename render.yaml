services:
  - type: web
    name: expense-tracker
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash scripts/render_start.sh
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_APP
        value: wsgi
      - key: RUN_MIGRATIONS
        value: "1"
      - key: AUTO_CREATE_TABLES
        value: "0"
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: OTP_DEV_MODE
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
